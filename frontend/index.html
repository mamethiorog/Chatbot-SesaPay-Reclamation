<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assistant Réclamations — SesaPay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      height: 650px;
    }

    .header {
      background: linear-gradient(135deg, #1B6B3A, #2E8B57);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .header-info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .header-info p {
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      display: flex; align-items: center; gap: 5px; margin-top: 2px;
    }
    .dot { width: 8px; height: 8px; background: #4ADE80; border-radius: 50%; display: inline-block; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8faf8;
    }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      background: #1B6B3A; color: #fff;
    }
    .msg.user .msg-avatar { background: #e8e8e8; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 75%; }
    .msg.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px 16px 16px 4px;
      background: #fff;
      border: 1px solid #e0e0e0;
      font-size: 13.5px;
      line-height: 1.6;
      color: #222;
    }
    .msg.user .bubble {
      background: #1B6B3A;
      color: #fff;
      border: none;
      border-radius: 16px 16px 4px 16px;
    }

    .timestamp { font-size: 10.5px; color: #aaa; padding: 0 4px; }
    .msg.user .timestamp { text-align: right; }

    .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; }
    .qr-btn {
      border: 1.5px solid #1B6B3A;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      background: transparent;
      color: #1B6B3A;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .qr-btn:hover { background: #1B6B3A; color: #fff; }

    .typing-bubble {
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 16px 16px 16px 4px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      background: #aaa; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .input-area {
      padding: 12px 14px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 13.5px;
      font-family: inherit;
      background: #f9f9f9;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #1B6B3A; background: #fff; }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #1B6B3A;
      border: none; cursor: pointer;
      font-size: 18px; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: default; }

    .footer {
      padding: 7px 14px;
      background: #f0f9f4;
      border-top: 1px solid #d4edda;
      font-size: 11px;
      color: #1B6B3A;
      text-align: center;
      flex-shrink: 0;
    }

    .loading-bar {
      height: 3px;
      background: linear-gradient(90deg, #1B6B3A, #4ADE80, #1B6B3A);
      background-size: 200%;
      animation: shimmer 1.5s infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="header">
    <div class="header-avatar">🤖</div>
    <div class="header-info">
      <h2>Assistant SesaPay</h2>
      <p><span class="dot"></span> Réclamations bourses · En ligne</p>
    </div>
  </div>

  <div class="loading-bar" id="loadingBar"></div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Décrivez votre problème..." />
    <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
  </div>

  <div class="footer">
    Service client · +221 78 308 01 01 · +221 78 308 00 00
  </div>
</div>

<script>
  // ============================================================
  // ⚙️  CONFIGURATION FRONTEND
  // Pointez vers l'adresse de votre backend
  // En local  : http://localhost:3000
  // En ligne  : https://votre-serveur.com
  // ============================================================
  const BACKEND_URL = "https://chatbot-sesapay-reclamation.onrender.com";
  // ============================================================

  const QUICK_REPLIES = {
    default:      ["Ma bourse n'est pas arrivée", "Je ne peux pas retirer", "Mon solde est incorrect", "Mon compte est bloqué"],
    notification: ["J'ai actualisé mais rien", "Je ne reçois aucune notification"],
    retrait:      ["Le code SES ne marche pas", "Le point de retrait est fermé", "Retrait partiel seulement"],
    contact:      ["Merci, je vais appeler", "J'ai une autre question"],
  };

  // Historique de conversation envoyé au backend à chaque message
  let conversationHistory = [];
  let isLoading = false;

  function getTime() {
    return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function detectQuickReplies(text) {
    const t = text.toLowerCase();
    if (t.includes("notification") || t.includes("actualiser")) return QUICK_REPLIES.notification;
    if (t.includes("retrait") || t.includes("code ses"))         return QUICK_REPLIES.retrait;
    if (t.includes("service client") || t.includes("78 308"))    return QUICK_REPLIES.contact;
    if (t.includes("problème") || t.includes("quel") || t.includes("comment puis")) return QUICK_REPLIES.default;
    return [];
  }

  function appendMessage(role, text, quickReplies = []) {
    const container = document.getElementById('messages');
    const msgDiv    = document.createElement('div');
    msgDiv.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    wrap.appendChild(bubble);

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = getTime();
    wrap.appendChild(ts);

    if (quickReplies.length > 0) {
      const qrDiv = document.createElement('div');
      qrDiv.className = 'quick-replies';
      quickReplies.forEach(qr => {
        const btn = document.createElement('button');
        btn.className = 'qr-btn';
        btn.textContent = qr;
        btn.onclick = () => { document.getElementById('userInput').value = qr; handleSend(); };
        qrDiv.appendChild(btn);
      });
      wrap.appendChild(qrDiv);
    }

    msgDiv.appendChild(avatar);
    msgDiv.appendChild(wrap);
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function setLoading(val) {
    isLoading = val;
    document.getElementById('sendBtn').disabled = val;
    document.getElementById('userInput').disabled = val;
    document.getElementById('loadingBar').style.display = val ? 'block' : 'none';
  }

  // Appelle UNIQUEMENT le backend — jamais l'API Gemini directement
  async function sendToBackend(userText) {
    conversationHistory.push({ role: "user", parts: [{ text: userText }] });

    const response = await fetch(`${BACKEND_URL}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ history: conversationHistory })
    });

    if (!response.ok) throw new Error("Erreur serveur : " + response.status);

    const data = await response.json();
    conversationHistory.push({ role: "model", parts: [{ text: data.reply }] });
    return data.reply;
  }

  async function handleSend() {
    const input = document.getElementById('userInput');
    const text  = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    appendMessage('user', text);
    setLoading(true);
    showTyping();

    try {
      const reply = await sendToBackend(text);
      removeTyping();
      appendMessage('bot', reply, detectQuickReplies(reply));
    } catch (e) {
      removeTyping();
      appendMessage('bot',
        "⚠️ Impossible de joindre le serveur. Vérifiez que le backend est démarré ou contactez le +221 78 308 01 01.",
        QUICK_REPLIES.contact
      );
    }

    setLoading(false);
  }

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSend();
  });

  async function init() {
    setLoading(true);
    showTyping();
    try {
      const reply = await sendToBackend("Bonjour");
      removeTyping();
      appendMessage('bot', reply, QUICK_REPLIES.default);
    } catch {
      removeTyping();
      appendMessage('bot',
        "Bonjour ! Je suis l'assistant SesaPay. Comment puis-je vous aider concernant votre bourse ?",
        QUICK_REPLIES.default
      );
    }
    setLoading(false);
  }

  init();
</script>
</body>
</html>
